<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kanban</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <h1>CafeStore Workspace</h1>
        </div>
        <div class="user-info">
            <span id="userName" class="user-name">Cargando...</span>
            <span id="userRole" class="user-role">...</span>
            <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="controls">
        <button id="btnNuevaTarea" class="btn-add">+ Nueva Tarea</button>
        <button id="btnGestionarUsuarios" class="btn-secondary"
            style="display: none; margin-left: 10px; background: rgba(255, 255, 255, 0.05); color: var(--text-light); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 20px; font-weight: 500; cursor: pointer; transition: all 0.3s ease;">Gestión
            de Usuarios</button>
    </div>

    <main class="kanban-board">
        <!-- Columna Pendiente -->
        <div class="kanban-column" data-status="PENDIENTE" id="col-pendiente">
            <h3>Pendiente <span class="count">0</span></h3>
            <div class="task-list"></div>
        </div>

        <!-- Columna En Proceso -->
        <div class="kanban-column" data-status="EN_PROCESO" id="col-proceso">
            <h3>En Proceso <span class="count">0</span></h3>
            <div class="task-list"></div>
        </div>

        <!-- Columna Hecho -->
        <div class="kanban-column" data-status="HECHO" id="col-hecho">
            <h3>Hecho <span class="count">0</span></h3>
            <div class="task-list"></div>
        </div>
    </main>

    <!-- Modal Nueva Tarea -->
    <div id="tareaModal" class="modal-overlay">
        <div class="glass-container modal-content relative">
            <button id="closeModal" class="close-btn">&times;</button>
            <h2 style="margin-bottom: 20px;">Crear Nueva Tarea</h2>
            <form id="tareaForm">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="tTitulo" required placeholder="Ej. Inventario de Cafe">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="tDesc" rows="3" required placeholder="Detalles de la tarea..."></textarea>
                </div>
                <div class="form-group">
                    <label>Urgencia</label>
                    <select id="tUrgencia" required>
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Asignar a</label>
                    <select id="tAsignado" required>
                        <option value="">Cargando empleados...</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Guardar Tarea</button>
            </form>
        </div>
    </div>

    <!-- Modal Gestionar Usuarios -->
    <div id="usuariosModal" class="modal-overlay">
        <div class="glass-container modal-content relative" style="max-width: 600px; width: 90%;">
            <button id="closeUsuariosModal" class="close-btn">&times;</button>
            <h2 style="margin-bottom: 20px;">Administración de Roles</h2>
            <div style="max-height: 400px; overflow-y: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                            <th style="padding: 10px;">Nombre</th>
                            <th style="padding: 10px;">Correo</th>
                            <th style="padding: 10px;">Rol</th>
                            <th style="padding: 10px;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
