<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CafeStore ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="glass-container auth-box">
            <h2>Bienvenido a CafeStore</h2>
            <p>Inicia sesión en tu cuenta de empleado</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" required placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" required placeholder="••••••••">
                </div>
                <p id="errorMsg" style="color: var(--danger); display: none; margin-bottom: 12px; font-size: 14px;"></p>
                <button type="submit" class="btn-primary">Ingresar</button>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="recuperar.html"
                        style="color: var(--text-muted); font-size: 14px; text-decoration: none; transition: color 0.3s;"
                        onmouseover="this.style.color='var(--primary)'"
                        onmouseout="this.style.color='var(--text-muted)'">¿Olvidaste tu contraseña?</a>
                </div>
                <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 20px 0;">
                <button type="button" class="btn-secondary" onclick="window.location.href='register.html'"
                    style="background: rgba(255, 255, 255, 0.05); color: var(--text-light); width: 100%; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s ease;"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.05)'">Crear nueva cuenta</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
